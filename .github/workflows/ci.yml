name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Public hygiene
        shell: pwsh
        run: ./scripts/check-public-hygiene.ps1
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
