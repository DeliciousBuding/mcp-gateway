name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Public hygiene
        shell: pwsh
        run: ./scripts/check-public-hygiene.ps1
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  release-assets:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w -X github.com/DeliciousBuding/mcp-gateway/internal/buildinfo.Version=${version} -X github.com/DeliciousBuding/mcp-gateway/internal/buildinfo.Commit=${commit} -X github.com/DeliciousBuding/mcp-gateway/internal/buildinfo.Date=${date}"
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
            "windows amd64"
          )
          for target in "${targets[@]}"; do
            read -r goos goarch <<<"${target}"
            name="mcp-gateway_${version}_${goos}_${goarch}"
            out="build/${name}/mcp-gateway"
            if [[ "${goos}" == "windows" ]]; then
              out="${out}.exe"
            fi
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags="${ldflags}" -o "${out}" ./cmd/mcp-gateway
            if [[ "${goos}" == "windows" ]]; then
              (cd "build/${name}" && zip -q "../../dist/${name}.zip" "mcp-gateway.exe")
            else
              tar -C "build/${name}" -czf "dist/${name}.tar.gz" "mcp-gateway"
            fi
          done
          (cd dist && sha256sum * > checksums.txt)
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --generate-notes --verify-tag

  container:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/deliciousbuding/mcp-gateway
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.repository.updated_at }}
